# .github/workflows/collect-feedback.yml
# Generated by engagement-harness ci templates --platform github
name: Weekly Feedback Sweep

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10

      - name: Clone Engagement Harness
        run: git clone https://github.com/abhishikthmeesala-2000/harness-review.git /tmp/harness

      - name: Build
        run: |
          cd /tmp/harness
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install CLI
        run: |
          printf '#!/bin/sh\nexec node /tmp/harness/packages/cli/dist/bin/engagement-harness.js "$@"\n' \
            | sudo tee /usr/local/bin/engagement-harness
          sudo chmod +x /usr/local/bin/engagement-harness

      - name: Collect feedback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          engagement-harness feedback collect \
            --repo ${{ github.repository }} \
            --days 7

      - name: Commit metrics
        run: |
          git config user.name "Engagement Harness Bot"
          git config user.email "engagement-harness[bot]@users.noreply.github.com"
          git add .engagement-harness/feedback/metrics.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
          else
            git commit -m "chore: weekly feedback update"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
